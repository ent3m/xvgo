name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      # AOT compilation requires the wasm-tools workload
      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Publish App
        run: dotnet publish XVGO/XVGO.csproj -c Release -o release

      # GitHub Pages ignores folders starting with underscores (like _framework)
      # We add a .nojekyll file to tell GitHub to serve them anyway.
      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      # Copy index.html to 404.html to handle client-side routing
      - name: Fix 404 Routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
